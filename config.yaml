data:
  train_path: "data/train.csv"
  test_path: "data/test.csv"
  target: "Survived"
  drop_cols: ["Name", "Ticket", "Cabin"]

models:
  logistic_regression:
    max_iter: 1000
  logistic_regression_l2:
    penalty: "l2"
    C: 0.01
  logistic_regression_l1:
    solver: "liblinear"
    penalty: "l1"
    C: 0.01
  logistic_regression_elastic:
    solver: "saga"
    penalty: "elasticnet"
    C: 0.01
    l1_ratio: 0.5
  decision_tree:
    max_depth: 3
    min_samples_leaf: 5
    min_samples_split: 10
    random_state: 21
  random_forest:
    n_estimators: 200
    max_depth: 3
    min_samples_leaf: 5
    min_samples_split: 10
    random_state: 21
  catboost:
    iterations: 1000
    learning_rate: 0.03
    depth: 3
    l2_leaf_reg: 3
    eval_metric: "AUC"
    early_stopping_rounds: 50
    verbose: False
    random_state: 21
  lightgbm:
    n_estimators: 1000
    learning_rate: 0.03
    num_leaves: 8
    max_depth: 3
    min_data_in_leaf: 30
    lambda_l2: 3
    lambda_l1: 1
    verbose: -1
    early_stopping_rounds: 50
    random_state: 21
  xgboost:
    n_estimators: 1000
    learning_rate: 0.03
    max_depth: 3
    reg_lambda: 1
    eval_metric: "auc"
    early_stopping_rounds: 50
    random_state: 21

dl_model:
  lr: 0.01
  weight_decay: 0.0001
  n_epoch: 80
  batch_size: 16